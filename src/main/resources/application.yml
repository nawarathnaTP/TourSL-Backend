spring:
  application:
    name: planning-service
  
  profiles:
    active: dev

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8001
  servlet:
    context-path: /

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}

logging:
  level:
    root: INFO
    com.travelplanner: DEBUG