services:
  db:
    image: postgres:16-alpine
    container_name: planning-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: planning_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d planning_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - planning-network

volumes:
  db_data:

networks:
  planning-network:
    driver: bridge